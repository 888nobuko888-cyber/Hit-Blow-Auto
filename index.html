<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hit&Blow</title>

<style>
body{background:#000;color:#fff;font-family:-apple-system;text-align:center;margin:0;}
#guess{font-size:32px;width:160px;text-align:center;margin:6px;}
button{font-size:18px;padding:10px;margin:3px;border-radius:10px;border:none;}
.keypad button{width:30%;}
.counter{font-size:26px;}
#log{height:120px;overflow:auto;border-top:1px solid #333;margin-top:5px;text-align:left;padding:5px;}
</style>
</head>

<body>

<h3>Hit&Blow</h3>

<button onclick="setMode(3)">3桁</button>
<button onclick="setMode(4)">4桁</button>

<p>現在: <span id="mode"></span></p>

<input id="guess" readonly>

<div class="keypad">
<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>
<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>
<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>
<button onclick="num(0)">0</button>
<button onclick="clr()">CLR</button>
</div>

<p>H</p>
<button onclick="hit(-1)">-</button>
<span id="hit" class="counter">0</span>
<button onclick="hit(1)">+</button>

<p>B</p>
<button onclick="blow(-1)">-</button>
<span id="blow" class="counter">0</span>
<button onclick="blow(1)">+</button>

<br>

<button onclick="submitTurn()">決定</button>
<button onclick="reset()">リセット</button>

<p>次: <span id="next"></span></p>
<p>候補: <span id="count"></span></p>

<div id="log"></div>

<script>

let DIGIT = 3;
let ALL = [];
let history=[];

// ===== 生成 =====
function gen(n){
let arr=[];
function dfs(s){
if(s.length===n){arr.push(s);return;}
for(let i=0;i<10;i++){
if(!s.includes(i)) dfs(s+i);
}
}
dfs("");
return arr;
}

// ===== HB =====
function hb(a,b){
let h=0,bl=0;
for(let i=0;i<DIGIT;i++){
if(a[i]===b[i]) h++;
else if(b.includes(a[i])) bl++;
}
return h+"-"+bl;
}

// ===== 入力 =====
function num(n){
let g=document.getElementById("guess");
if(g.value.length>=DIGIT) return;
if(g.value.includes(n)) return;
g.value+=n;
}
function clr(){document.getElementById("guess").value="";}

// ===== カウンタ =====
function hit(v){
let el=document.getElementById("hit");
let n=parseInt(el.innerText)+v;
if(n>=0 && n<=DIGIT) el.innerText=n;
}
function blow(v){
let el=document.getElementById("blow");
let n=parseInt(el.innerText)+v;
if(n>=0 && n<=DIGIT) el.innerText=n;
}

// ===== 候補 =====
function getCandidates(){
return ALL.filter(c=>{
return history.every(his=>{
return hb(his.g,c)===(his.h+"-"+his.b);
});
});
}

// ===== 3桁 =====
function ai3(candidates){

if(candidates.length <= 5) return candidates[0];

let best=null;
let bestScore=Infinity;

for(let guess of candidates){

let map={};

for(let c of candidates){
let r=hb(guess,c);
map[r]=(map[r]||0)+1;
}

let worst=0, expected=0;

for(let k in map){
let s=map[k];
worst=Math.max(worst,s);
expected+=s*s;
}

let score = worst*8 + expected;

if(score < bestScore){
bestScore = score;
best = guess;
}
}

return best;
}

// ===== 4桁=====
function ai4(candidates){

if(candidates.length <= 3) return candidates[0];

let bestList=[];
let bestScore=Infinity;

for(let guess of ALL){

let map={};

for(let c of candidates){
let r=hb(guess,c);
(map[r] ||= []).push(c);
}

let worst=0, expected=0, entropy=0, depth2=0;

for(let key in map){

let group = map[key];
let size = group.length;

worst=Math.max(worst,size);
expected+=size*size;

let p=size/candidates.length;
entropy -= p*Math.log2(p);

// 2手先
let second;

if(size <= 25){

let best2=Infinity;

for(let g2 of group){

let map2={};

for(let c2 of group){
let r2=hb(g2,c2);
map2[r2]=(map2[r2]||0)+1;
}

let worst2=Math.max(...Object.values(map2));
if(worst2 < best2) best2 = worst2;
}

second = best2;

}else{
second = size;
}

depth2 += second;
}

let score =
  worst*6 +
  expected/candidates.length +
  depth2*2 -
  entropy*2.5;

if(score < bestScore){
bestScore = score;
bestList=[guess];
}else if(score===bestScore){
bestList.push(guess);
}

}

// 中央寄せ
bestList.sort((a,b)=>{
let sa=0,sb=0;
for(let i=0;i<4;i++){
sa+=Math.abs(a[i]-5);
sb+=Math.abs(b[i]-5);
}
return sa-sb;
});

return bestList[0];
}

// ===== 実行 =====
function submitTurn(){

let g=document.getElementById("guess").value;
let h=parseInt(document.getElementById("hit").innerText);
let b=parseInt(document.getElementById("blow").innerText);

if(g.length!==DIGIT){
alert(DIGIT+"桁入力");
return;
}

history.push({g,h,b});

document.getElementById("log").innerHTML += g+" → "+h+"H "+b+"B<br>";

let candidates=getCandidates();

if(candidates.length===0){
alert("矛盾");
return;
}

document.getElementById("next").innerText="計算中...";

setTimeout(()=>{

let next = DIGIT===3 ? ai3(candidates) : ai4(candidates);

document.getElementById("next").innerText=next;
document.getElementById("count").innerText=candidates.length;
document.getElementById("guess").value=next;

document.getElementById("hit").innerText=0;
document.getElementById("blow").innerText=0;

},10);
}

// ===== モード =====
function setMode(n){
DIGIT=n;
ALL=gen(n);
document.getElementById("mode").innerText=n+"桁";
reset();
}

// ===== リセット =====
function reset(){
history=[];
document.getElementById("log").innerHTML="";
let start = DIGIT===3 ? "012" : "0123";
document.getElementById("guess").value=start;
document.getElementById("next").innerText=start;
document.getElementById("count").innerText=ALL.length;
document.getElementById("hit").innerText=0;
document.getElementById("blow").innerText=0;
}

setMode(3);

</script>

</body>
</html>
